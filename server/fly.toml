app = 'jukesats-spark'
primary_region = 'lhr'

[build]

[env]
  PORT = "3001"
  DEFAULT_REWARD_SATS = "330"
  TAP_COOLDOWN_MS = "60000"
  DAILY_SPEND_CAP_SATS = "100000"
  IP_RATE_LIMIT_MAX = "10"
  ENABLE_SIMULATE_TAP = "false"
  DB_PATH = "/data/jukesats.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[mounts]
  source = "jukesats_spark_data"
  destination = "/data"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
